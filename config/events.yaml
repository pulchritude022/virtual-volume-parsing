                 "covenant-subscription", "solemn acknowledgment",
                 "receiving to the covenant", "debarring engagers",
                 "subscribing the national covenant", "self-vindication before covenant"]

  - name: "The Dunbar prisoners' relief"
    image_range: { min: 195, max: 255 }
    topics_any: ["dunbar"]

  - name: "The Resolutioner–Protester schism"
    image_range: { min: 228, max: 257 }
    people_any: ["turnbull"]
    topics_any: ["resolutioner", "protester", "protestation", "public-resolution",
                 "public resolutions", "dissent", "conscience"]

  - name: "The Cromwellian conquest and the Tender of Union"
    image_range: { min: 238, max: 257 }
